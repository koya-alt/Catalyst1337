kind = "web"
previewPath = "/"
title = "Catalyst — Discord Bot"
version = "1.0.0"
id = "artifacts/catalyst"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 24400

[services.development]
run = "pnpm --filter @workspace/catalyst run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/catalyst", "run", "build" ]
publicDir = "artifacts/catalyst/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "24400"
BASE_PATH = "/"
