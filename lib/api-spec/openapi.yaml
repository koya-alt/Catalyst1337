openapi: 3.1.0
info:
  title: Api
  version: 0.1.0
  description: Catalyst Discord Bot API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: auth
    description: Authentication operations
  - name: bot
    description: Discord bot operations
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /auth/login:
    post:
      operationId: login
      tags: [auth]
      summary: Login with password
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginBody"
      responses:
        "200":
          description: Login result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LoginResponse"

  /auth/logout:
    post:
      operationId: logout
      tags: [auth]
      summary: Logout
      responses:
        "200":
          description: Logged out
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OkResponse"

  /auth/check:
    get:
      operationId: authCheck
      tags: [auth]
      summary: Check authentication status
      responses:
        "200":
          description: Auth status
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthCheckResponse"

  /bot/connect:
    post:
      operationId: connectBot
      tags: [bot]
      summary: Connect bot with token
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ConnectBotBody"
      responses:
        "200":
          description: Connection result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ConnectBotResponse"

  /bot/disconnect:
    post:
      operationId: disconnectBot
      tags: [bot]
      summary: Disconnect the bot
      responses:
        "200":
          description: Disconnection result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OkResponse"

  /bot/status:
    get:
      operationId: getBotStatus
      tags: [bot]
      summary: Get bot connection status
      responses:
        "200":
          description: Bot status
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BotStatusResponse"

  /bot/guilds:
    get:
      operationId: getBotGuilds
      tags: [bot]
      summary: Get guilds the bot is in
      responses:
        "200":
          description: List of guilds
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GuildsResponse"

  /bot/channels:
    get:
      operationId: getBotChannels
      tags: [bot]
      summary: Get channels for a guild
      parameters:
        - name: guildId
          in: query
          required: true
          schema:
            type: string
      responses:
        "200":
          description: List of channels
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ChannelsResponse"

  /bot/members:
    get:
      operationId: getBotMembers
      tags: [bot]
      summary: Get members for a guild
      parameters:
        - name: guildId
          in: query
          required: true
          schema:
            type: string
      responses:
        "200":
          description: List of members
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MembersResponse"

  /bot/leave-guild:
    post:
      operationId: leaveGuild
      tags: [bot]
      summary: Bot leaves a guild
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/GuildActionBody"
      responses:
        "200":
          description: Action result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ActionResponse"

  /bot/delete-channels:
    post:
      operationId: deleteChannels
      tags: [bot]
      summary: Delete all channels in a guild
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/GuildActionBody"
      responses:
        "200":
          description: Action result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BulkActionResponse"

  /bot/delete-roles:
    post:
      operationId: deleteRoles
      tags: [bot]
      summary: Delete all roles in a guild
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/GuildActionBody"
      responses:
        "200":
          description: Action result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BulkActionResponse"

  /bot/kick-all:
    post:
      operationId: kickAllMembers
      tags: [bot]
      summary: Kick all members from a guild
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/GuildActionBody"
      responses:
        "200":
          description: Action result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BulkActionResponse"

  /bot/ban-all:
    post:
      operationId: banAllMembers
      tags: [bot]
      summary: Ban all members from a guild
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/GuildActionBody"
      responses:
        "200":
          description: Action result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BulkActionResponse"

  /bot/unban-all:
    post:
      operationId: unbanAllMembers
      tags: [bot]
      summary: Unban all banned members from a guild
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/GuildActionBody"
      responses:
        "200":
          description: Action result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BulkActionResponse"

  /bot/nuke:
    post:
      operationId: nukeGuild
      tags: [bot]
      summary: Nuke a guild (delete channels, roles, ban/kick all, leave)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/NukeBody"
      responses:
        "200":
          description: Nuke result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/NukeResponse"

  /bot/ban-user:
    post:
      operationId: banUser
      tags: [bot]
      summary: Ban a single user by ID
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UserActionBody"
      responses:
        "200":
          description: Action result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ActionResponse"

  /bot/kick-user:
    post:
      operationId: kickUser
      tags: [bot]
      summary: Kick a single user by ID
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UserActionBody"
      responses:
        "200":
          description: Action result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ActionResponse"

  /bot/unban-user:
    post:
      operationId: unbanUser
      tags: [bot]
      summary: Unban a single user by ID
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UserActionBody"
      responses:
        "200":
          description: Action result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ActionResponse"

  /bot/dm-all:
    post:
      operationId: dmAllMembers
      tags: [bot]
      summary: Send a DM to all members in a guild
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DmAllBody"
      responses:
        "200":
          description: DM result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BulkActionResponse"

  /bot/send-message:
    post:
      operationId: sendMessage
      tags: [bot]
      summary: Send a message to a channel
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SendMessageBody"
      responses:
        "200":
          description: Send result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ActionResponse"

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    OkResponse:
      type: object
      properties:
        success:
          type: boolean
      required:
        - success

    LoginBody:
      type: object
      properties:
        password:
          type: string
      required:
        - password

    LoginResponse:
      type: object
      properties:
        success:
          type: boolean
        error:
          type: string
      required:
        - success

    AuthCheckResponse:
      type: object
      properties:
        loggedIn:
          type: boolean
      required:
        - loggedIn

    ConnectBotBody:
      type: object
      properties:
        token:
          type: string
      required:
        - token

    ConnectBotResponse:
      type: object
      properties:
        success:
          type: boolean
        username:
          type: string
        error:
          type: string
      required:
        - success

    BotStatusResponse:
      type: object
      properties:
        connected:
          type: boolean
        username:
          type: string
      required:
        - connected

    Guild:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        icon:
          type: string
        memberCount:
          type: integer
      required:
        - id
        - name

    GuildsResponse:
      type: object
      properties:
        success:
          type: boolean
        guilds:
          type: array
          items:
            $ref: "#/components/schemas/Guild"
      required:
        - success
        - guilds

    Channel:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        type:
          type: integer
      required:
        - id
        - name
        - type

    ChannelsResponse:
      type: object
      properties:
        success:
          type: boolean
        channels:
          type: array
          items:
            $ref: "#/components/schemas/Channel"
      required:
        - success
        - channels

    Member:
      type: object
      properties:
        id:
          type: string
        username:
          type: string
        displayName:
          type: string
        avatar:
          type: string
        isBot:
          type: boolean
      required:
        - id
        - username
        - displayName
        - isBot

    MembersResponse:
      type: object
      properties:
        success:
          type: boolean
        members:
          type: array
          items:
            $ref: "#/components/schemas/Member"
        error:
          type: string
      required:
        - success
        - members

    GuildActionBody:
      type: object
      properties:
        guildId:
          type: string
      required:
        - guildId

    UserActionBody:
      type: object
      properties:
        guildId:
          type: string
        userId:
          type: string
        reason:
          type: string
      required:
        - guildId
        - userId

    NukeBody:
      type: object
      properties:
        guildId:
          type: string
        deleteChannels:
          type: boolean
        deleteRoles:
          type: boolean
        kickAll:
          type: boolean
        banAll:
          type: boolean
        leaveAfter:
          type: boolean
      required:
        - guildId

    NukeResponse:
      type: object
      properties:
        success:
          type: boolean
        steps:
          type: array
          items:
            type: object
            properties:
              step:
                type: string
              success:
                type: boolean
              count:
                type: integer
              error:
                type: string
            required:
              - step
              - success
        error:
          type: string
      required:
        - success
        - steps

    DmAllBody:
      type: object
      properties:
        guildId:
          type: string
        message:
          type: string
      required:
        - guildId
        - message

    ActionResult:
      type: object
      properties:
        success:
          type: boolean
        name:
          type: string
        error:
          type: string
      required:
        - success
        - name

    ActionResponse:
      type: object
      properties:
        success:
          type: boolean
        message:
          type: string
        error:
          type: string
      required:
        - success

    BulkActionResponse:
      type: object
      properties:
        success:
          type: boolean
        results:
          type: array
          items:
            $ref: "#/components/schemas/ActionResult"
        error:
          type: string
      required:
        - success

    SendMessageBody:
      type: object
      properties:
        guildId:
          type: string
        channelId:
          type: string
        message:
          type: string
      required:
        - guildId
        - channelId
        - message
